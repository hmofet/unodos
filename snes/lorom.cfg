# ld65 config: UnoDOS/SNES LoROM, 32 KB, slow ROM.
# ROM area maps to bank $00 $8000-$FFFF (the conventional LoROM view).
# File offset of a $8000+ address X is (X - $8000); header lands at $7FC0.
MEMORY {
    ZP:   start=$0000, size=$0100, type=rw;
    BSS:  start=$0100, size=$1F00, type=rw;
    ROM:  start=$8000, size=$8000, type=ro, file=%O, fill=yes, fillval=$00;
}
SEGMENTS {
    CODE:        load=ROM, type=ro, start=$8000;
    RODATA:      load=ROM, type=ro;
    SNESHEADER:  load=ROM, type=ro, start=$FFC0;
    SNESVECTORS: load=ROM, type=ro, start=$FFE0;
    ZEROPAGE:    load=ZP,  type=zp,  optional=yes;
    BSS:         load=BSS, type=bss, optional=yes;
}
