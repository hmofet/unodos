# =============================================================================
# STRUCTS.  Field syntax: "name : type @offset [le|be]"  (default endian = le).
# Offsets are byte-exact and ARE the contract.
# =============================================================================

# Window-table entry. kernel.asm: WIN_ENTRY_SIZE=32, WIN_MAX_COUNT=16, WIN_OFF_*.
[[struct]]
name = "win_entry"
size = 32
count = 16                # fixed table of 16 windows (window_table)
fields = [
  "state         : u8      @0",   # enum win_state
  "flags         : u8      @1",   # enum win_flags
  "x             : u16     @2",
  "y             : u16     @4",
  "width         : u16     @6",
  "height        : u16     @8",
  "zorder        : u8      @10",  # 0=bottom .. 15=top
  "owner         : u8      @11",  # owning task handle; 0xFF = kernel
  "title         : char[12]@12",  # 11 chars + NUL
  "content_scale : u8      @24",  # 1=normal, 2=double (hi-res auto-scale)
  "reserved      : bytes[7]@25",
]

# Event record. kernel.asm: event_queue = 32 entries * 3 bytes, head/tail indices.
[[struct]]
name = "event"
size = 3
count = 32                # single global queue; forward-scan delivery w/ tombstones
fields = [
  "type : u8  @0",   # enum event_type
  "data : u16 @1",   # meaning depends on type (e.g. KEY_PRESS: lo=ASCII, hi=scan/focus-stamp)
]

# File-handle table entry. kernel.asm: FILE_ENTRY_SIZE=32, FILE_MAX_HANDLES=16.
# NOTE: the in-source data-section comment says "bytes 12-31 reserved", but the
# CODE writes owner at byte 24 (lines ~12669/14369/15177/19049) and PORT-SPEC §5
# pins owner @24. The comment is drift; this struct encodes the CODE. See [discrepancies].
[[struct]]
name = "file_handle"
size = 32
count = 16
fields = [
  "status         : u8     @0",   # 0=free, 1=open
  "mount          : u8     @1",   # mount handle
  "start_cluster  : u16    @2",
  "size           : u32    @4",   # file size (di+4 lo, di+6 hi)
  "position       : u32    @8",   # current position
  "owner          : u8     @24",  # owning task; 0xFF = kernel; owner-based reaping mandatory
  "reserved_a     : bytes[12]@12",
  "reserved_b     : bytes[7] @25",
]

# FAT12 on-disk directory entry (standard FAT 8.3). Offsets confirmed in kernel
# read path: attr @0x0B (12528), start cluster @0x1A (12630), size @0x1C (12631/12632).
[[struct]]
name = "dirent"
size = 32
fields = [
  "name          : char[11]@0",    # 8.3, space-padded, no dot. 0xE5=deleted, 0x00=free, 0x0F attr=LFN
  "attr          : u8      @11",
  "reserved      : bytes[10]@12",  # NT res, ctime, adate, (FAT12: cluster-hi unused) ...
  "wtime         : u16     @22",
  "wdate         : u16     @24",
  "start_cluster : u16     @26",   # 0x1A
  "size          : u32     @28",   # 0x1C
]

# .BIN application container header (port-independent). PORT-SPEC §4. Multi-byte
# fields stay LE for disk interchange even on BE ports. The 3.1 ".UNO v2" break
# adds explicit abi_version + arch tag (CONTRACT-ARCH §11) — not yet shipped here.
[[struct]]
name = "bin_header"
size = 80                          # code entry at 0x50
fields = [
  "magic : bytes[4] @0",           # 0xEB ?? 'U' 'I' — first byte doubles as x86 JMP
  "name  : char[12] @4",           # 0x04: NUL-padded display name
  "icon  : bytes[64]@16",          # 0x10: 16x16 @ 2bpp packed chunky, row-major, leftmost px in 2 MSBs
]
# entry: code begins at offset 0x50 (= size); app_run far-calls seg:0x0050.


# =============================================================================
# CONSTANTS
# =============================================================================

# FAT12 geometry — the "FIVE places" (PORT-SPEC §5), unified to ONE block.
# Currently duplicated by hand in: kernel/kernel.asm (mount routine + data
# defaults), boot/boot.asm (BPB), boot/stage2.asm (KERNEL_SECTORS layout),
# tools/add_floppy_fs.py, tools/create_app_test.py. Phase 1 regenerates them all.
# Values are for the x86 1.44 MB floppy. The UnoDOS filesystem starts at sector
# 110 (OS area: 1 boot + 4 stage2 + 104 kernel + 1 spare); derived sectors are
# ABSOLUTE (include the +110 base).
[const.fat12]
bytes_per_sector   = 512
sectors_per_cluster = 1
reserved_sectors   = 1            # within the filesystem
num_fats           = 2
root_dir_entries   = 224
sectors_per_fat    = 9
fs_start_sector    = 110          # OS area size; FS base offset
# Derived (encoded for the byte-identical anchor; Phase 1 will also emit the formulas):
fat_start          = 111          # = fs_start + reserved
root_dir_start     = 129          # = fs_start + reserved + num_fats*sectors_per_fat
root_dir_sectors   = 14           # = root_dir_entries*32 / bytes_per_sector
data_area_start    = 143          # = root_dir_start + root_dir_sectors
fat_cache_pair     = true         # cache holds sectors [S, S+1]: a 12-bit entry can straddle 511->S+1

# Font metrics. kernel.asm font_table: FONT_COUNT=3, FONT_DESC_SIZE=6 bytes/entry
# (ptr, height, width, advance, bpc). Default current_font=1. The font-advance
# bug is FIXED IN THE CONTRACT: default advance = 8 (not 12). See [discrepancies].
[const.font]
count   = 3
default = 1                        # 8x8 medium
[[const.font.table]]
index=0
name="font_4x6"
width=4
height=6
advance=6
bpc=6
role="small"
[[const.font.table]]
index=1
name="font_8x8"
width=8
height=8
advance=8
bpc=8
role="medium/default"
[[const.font.table]]
index=2
name="font_8x12"
width=8
height=12
advance=12
bpc=12
role="large"

# Default UI palette (indices 0-3). PORT-SPEC §1. Two representations both ship:
# 24-bit RGB (the canonical themed colors) and the x86 6-bit VGA DAC triples
# (kernel theme_palette default, "Classic VGA"). Ports match the rgb24 values.
[const.palette]
rgb24      = [0x0000AA, 0x00AAAA, 0xAA00AA, 0xFFFFFF]   # blue desktop, cyan, magenta, white
vga6bit    = [[0,0,42], [0,42,42], [42,0,42], [63,63,63]]
roles      = ["desktop/bg", "accent1", "accent2", "fg/white"]

# Screen + desktop metrics (x86 default mode). kernel.asm defaults.
[const.screen]
default_mode   = 0x04              # CGA mode 4
width          = 320
height         = 200
titlebar_height = 10               # 10 lo-res, 18 hi-res (dynamic)
desktop_reserved_rows = 12         # y 0-11 is the menu/title row (drag clamp)
icon_column_pitch = 80
cursor          = { w = 8, h = 14, kind = "arrow" }


# =============================================================================
# ENUMS
# =============================================================================

[enum.event_type]
NONE        = 0
KEY_PRESS   = 1
KEY_RELEASE = 2          # reserved (future)
TIMER       = 3          # reserved (future)
MOUSE       = 4          # data low = button mask
WIN_MOVED   = 5
WIN_REDRAW  = 6          # data low = window handle
CONSUMED    = 0xFF       # tombstone: slot consumed mid-queue

[enum.win_state]
FREE    = 0
VISIBLE = 1
HIDDEN  = 2

[enum.win_flags]            # bitmask
TITLE   = 0x01
BORDER  = 0x02
# bit2 (0x04) = FRAMELESS_FULLSCREEN per PORT-SPEC §2; kernel implements the
# frameless path but has no named equate yet. Encoded as the contract bit.
FRAMELESS_FULLSCREEN = 0x04

# Filesystem error codes (returned in AX on CF=1). API_REFERENCE.
[enum.fs_errno]
OK            = 0
NOT_FOUND     = 1
NO_DRIVER     = 2
READ_ERROR    = 3
INVALID_HANDLE = 4
NO_HANDLES    = 5
END_OF_DIR    = 6
WRITE_ERROR   = 7
DISK_FULL     = 8
DIR_FULL      = 9


# =============================================================================
# PROFILES & CAPABILITIES (CONTRACT-ARCH §9).  x86 reference declares `windowed`.
# Encoded minimally in Phase 0; the §9 matrix is filled across §13 in later phases.
# =============================================================================
[profile.windowed]
requires = ["wm", "mouse_or_dirnav", "fs"]
[profile.single_app]
requires = ["fs?"]
one_app  = true
[profile.minimal]
requires = []
one_app  = true
no_fs_ok = true
dirnav   = true

[port.x86]
profile      = "windowed"
capabilities = ["POINTER", "RTC"]   # PC speaker audio; no SMP/PREEMPT/NET in the shipping kernel


# =============================================================================
# DISCREPANCY LEDGER — the contradictions this contract resolves (the whole point).
# CONTRACT-ARCH §1. Each is now single-sourced above; Phase 1 proves byte-identical.
# =============================================================================
[discrepancies]
syscall_count = "PORT-SPEC §4 / ARCHITECTURE say '105 functions'; kernel_api_table is 106 slots (ordinals 0..105 inclusive). Resolved: callgate.count = 106 = len(syscall). The '105' was an off-by-one (last ordinal vs count)."
font_advance  = "ARCHITECTURE.md says advance '12 px'; PORT-SPEC §1 and kernel (draw_font_advance db 8, font_table font 1) say 8. Resolved: const.font default(1).advance = 8. The 12-px advance was a bug."
handle_owner  = "kernel.asm file_table data-section comment says 'bytes 12-31 reserved'; the code writes/reads owner at byte 24 and PORT-SPEC §5 pins owner @24. Resolved: struct file_handle.owner @24; the comment is stale drift."
fat12_geometry = "FAT12 geometry was hand-duplicated in 5 places (kernel mount routine, kernel data defaults, boot/boot.asm BPB, boot/stage2.asm layout, tools/add_floppy_fs.py + tools/create_app_test.py). Resolved: const.fat12 is the single block; Phase 1 regenerates all consumers."
